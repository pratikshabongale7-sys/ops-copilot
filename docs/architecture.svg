<svg viewBox="0 0 780 700" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif" role="img">
  <title>How LangGraph, LangChain and MCP relate in the Ops Copilot agent</title>
  <desc>LangGraph owns the reason-act loop; LangChain provides the model, tool and message abstractions; MCP is the hop from a tool object down to your server. One tool call traverses LangChain tool, the MCP adapter, your MCP server, and the incident files.</desc>
  <style>
    .box { fill: #f5f5f3; stroke: #d4d4d0; stroke-width: 1.5; }
    .tp { fill: #1f1f1f; }
    .ts { fill: #6b6b6b; }
    .lg { stroke: #4f46e5; }
    .lgfill { fill: #4f46e5; }
    .mc { stroke: #0d9488; }
    .mcfill { fill: #0d9488; }
    .lbl { font-size: 12px; }
    .sub { font-size: 11px; }
    .hd { font-size: 13px; font-weight: 700; }
    text { font-size: 13px; }
  </style>

  <defs>
    <marker id="aLG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#4f46e5"/></marker>
    <marker id="aMC" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#0d9488"/></marker>
    <marker id="aN" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#6b6b6b"/></marker>
  </defs>

  <!-- SECTION A: the loop -->
  <rect x="16" y="44" width="748" height="250" rx="12" fill="none" class="lg" stroke-dasharray="6 5"/>
  <text x="34" y="68" class="hd lgfill">LangGraph — the loop (state + control flow)</text>

  <rect class="box" x="34" y="120" width="150" height="66" rx="8"/>
  <text x="109" y="150" text-anchor="middle" class="lbl tp" font-weight="600">User task</text>
  <text x="109" y="168" text-anchor="middle" class="sub ts">"diagnose inc_001"</text>

  <rect class="box lg" x="300" y="112" width="176" height="82" rx="8"/>
  <text x="388" y="140" text-anchor="middle" class="lbl tp" font-weight="600">Agent node</text>
  <text x="388" y="158" text-anchor="middle" class="sub ts">reason · pick a tool</text>
  <text x="388" y="174" text-anchor="middle" class="sub ts">or decide it's done</text>

  <rect class="box lg" x="592" y="112" width="150" height="82" rx="8"/>
  <text x="667" y="148" text-anchor="middle" class="lbl tp" font-weight="600">Tool node</text>
  <text x="667" y="166" text-anchor="middle" class="sub ts">run chosen tool</text>

  <line x1="184" y1="153" x2="296" y2="153" class="lg" stroke-width="2" marker-end="url(#aLG)"/>
  <line x1="476" y1="140" x2="588" y2="140" class="lg" stroke-width="2" marker-end="url(#aLG)"/>
  <text x="532" y="132" text-anchor="middle" class="sub lgfill">calls tool</text>
  <line x1="588" y1="172" x2="476" y2="172" class="lg" stroke-width="2" marker-end="url(#aLG)"/>
  <text x="532" y="188" text-anchor="middle" class="sub lgfill">result → observe, loop</text>

  <line x1="388" y1="194" x2="388" y2="234" class="lg" stroke-width="2" marker-end="url(#aLG)"/>
  <text x="398" y="220" class="sub lgfill">when confident</text>
  <rect class="box" x="300" y="236" width="176" height="46" rx="8"/>
  <text x="388" y="264" text-anchor="middle" class="lbl tp">Conclude → Diagnosis</text>

  <text x="34" y="212" class="sub ts">LangChain also wraps the LLM (ChatGroq), the messages,</text>
  <text x="34" y="228" class="sub ts">and the final with_structured_output → Diagnosis.</text>

  <!-- SECTION B: one tool call -->
  <text x="34" y="336" class="hd mcfill">What ONE tool call actually traverses (the Tool node, drilled down)</text>

  <rect class="box mc" x="230" y="360" width="320" height="52" rx="8"/>
  <text x="390" y="382" text-anchor="middle" class="lbl tp" font-weight="600">LangChain Tool object</text>
  <text x="390" y="400" text-anchor="middle" class="sub ts">the callable the agent invokes</text>

  <rect class="box mc" x="230" y="438" width="320" height="52" rx="8"/>
  <text x="390" y="460" text-anchor="middle" class="lbl tp" font-weight="600">langchain-mcp-adapters</text>
  <text x="390" y="478" text-anchor="middle" class="sub ts">bridge: MCP ⇄ LangChain</text>

  <rect class="box mc" x="230" y="516" width="320" height="52" rx="8"/>
  <text x="390" y="538" text-anchor="middle" class="lbl tp" font-weight="600">MCP server — app/mcp_server.py</text>
  <text x="390" y="556" text-anchor="middle" class="sub ts">your Phase-2 tools, over stdio</text>

  <rect class="box" x="230" y="594" width="320" height="52" rx="8"/>
  <text x="390" y="616" text-anchor="middle" class="lbl tp" font-weight="600">tools.py → incident files</text>
  <text x="390" y="634" text-anchor="middle" class="sub ts">reads logs / metrics / deploys</text>

  <line x1="390" y1="412" x2="390" y2="436" class="mc" stroke-width="2" marker-end="url(#aMC)"/>
  <line x1="390" y1="490" x2="390" y2="514" class="mc" stroke-width="2" marker-end="url(#aMC)"/>
  <text x="400" y="507" class="sub mcfill">MCP call</text>
  <line x1="390" y1="568" x2="390" y2="592" class="mc" stroke-width="2" marker-end="url(#aN)"/>

  <path d="M560 620 L610 620 L610 372 L554 372" fill="none" class="mc" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#aMC)"/>
  <text x="618" y="500" class="sub mcfill" transform="rotate(90 618 500)">result travels back up → ToolMessage</text>

  <path d="M667 194 L667 330 L390 330 L390 358" fill="none" class="mc" stroke-width="1.5" stroke-dasharray="3 4" marker-end="url(#aMC)"/>

  <!-- legend -->
  <rect x="600" y="360" width="164" height="120" rx="8" class="box"/>
  <text x="616" y="382" class="lbl tp" font-weight="700">Who owns what</text>
  <rect x="616" y="396" width="14" height="14" rx="3" class="lgfill"/>
  <text x="638" y="408" class="sub tp">LangGraph = the loop</text>
  <rect x="616" y="420" width="14" height="14" rx="3" class="mcfill"/>
  <text x="638" y="432" class="sub tp">LangChain + MCP</text>
  <text x="638" y="446" class="sub ts">= tool-call path</text>
  <rect x="616" y="454" width="14" height="14" rx="3" fill="#f5f5f3" stroke="#d4d4d0"/>
  <text x="638" y="466" class="sub tp">your code / data</text>
</svg>
